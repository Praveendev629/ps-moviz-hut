<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PS Moviz Hut</title>
  <link rel="icon" type="image/png" href="/assets/logo.png"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Ionicons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- ═══════════════════ INTRO SCREEN ═══════════════════ -->
<div id="intro-screen">
  <video id="intro-video" autoplay muted playsinline>
    <source src="/assets/intro.mp4" type="video/mp4"/>
  </video>
  <div id="intro-overlay">
    <img src="/assets/logo.png" alt="PS Moviz Hut Logo" id="intro-logo"/>
    <div id="intro-loader">
      <span></span><span></span><span></span>
    </div>
  </div>
  <button id="skip-btn"><i class="fa-solid fa-forward"></i> SKIP</button>
</div>

<!-- ═══════════════════ MAIN APP ═══════════════════ -->
<div id="app" class="hidden">

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <img src="/assets/logo.png" alt="PS Moviz Hut"/>
      <span>PS MOVIZ HUT</span>
    </div>
    <div id="sidebar-label">CATEGORIES</div>
    <nav id="sidebar-nav">
      <button class="nav-btn active" data-cat="all"><i class="fa-solid fa-film"></i> All Tamil</button>
      <button class="nav-btn" data-cat="tamil-2026-movies"><i class="fa-solid fa-star"></i> Tamil 2026</button>
      <button class="nav-btn" data-cat="tamil-2025-movies"><i class="fa-solid fa-calendar"></i> Tamil 2025</button>
      <button class="nav-btn" data-cat="tamil-2024-movies"><i class="fa-solid fa-calendar"></i> Tamil 2024</button>
      <button class="nav-btn" data-cat="tamil-2023-movies"><i class="fa-solid fa-calendar"></i> Tamil 2023</button>
      <button class="nav-btn" data-cat="tamil-web-series-download"><i class="fa-solid fa-tv"></i> Web Series</button>
      <button class="nav-btn" data-cat="tamil-dubbed-movies"><i class="fa-solid fa-language"></i> Tamil Dubbed</button>
    </nav>
    <div id="sidebar-footer">
      <ion-icon name="shield-checkmark-outline"></ion-icon> Powered by Moviesda
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main id="main-content">

    <!-- Header -->
    <header id="top-bar">
      <button id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
      <div id="top-bar-title">
        <img src="/assets/logo.png" alt="" style="height:32px"/>
        <span>PS <span class="red">MOVIZ</span> HUT</span>
      </div>
      <div id="top-bar-actions">
        <button id="theme-toggle"><i class="fa-solid fa-circle-half-stroke"></i></button>
      </div>
    </header>

    <!-- Chat Messages Area -->
    <div id="chat-area">
      <!-- Welcome Message -->
      <div class="msg bot-msg" id="welcome-msg">
        <img src="/assets/logo.png" alt="Bot" class="bot-avatar"/>
        <div class="bubble">
          <div class="bubble-header">PS MOVIZ HUT</div>
          <p>Welcome! <span class="red">Search any Tamil movie</span> below.</p>
          <p>Type a movie name and hit <b>SEND</b> — I'll fetch posters, watch links, and download options from Moviesda!</p>
          <div class="tag-chips">
            <span class="chip" onclick="quickSearch('Leo')">Leo</span>
            <span class="chip" onclick="quickSearch('Jailer')">Jailer</span>
            <span class="chip" onclick="quickSearch('Vikram')">Vikram</span>
            <span class="chip" onclick="quickSearch('Kanguva')">Kanguva</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Bar -->
    <div id="input-bar">
      <div id="input-wrapper">
        <i class="fa-solid fa-magnifying-glass" id="search-icon"></i>
        <input type="text" id="search-input" placeholder="Search Tamil movies... (e.g. Leo, Jailer, Vikram)" autocomplete="off"/>
        <button id="send-btn" onclick="sendSearch()">
          <i class="fa-solid fa-paper-plane"></i> SEND
        </button>
      </div>
    </div>

  </main>
</div>

<!-- ═══════════════════ MOVIE MODAL ═══════════════════ -->
<div id="movie-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="modal-content">Loading...</div>
  </div>
</div>

<!-- ═══════════════════ PLAYER MODAL ═══════════════════ -->
<div id="player-modal" class="modal-overlay hidden">
  <div class="modal-box player-modal-box">
    <button class="modal-close" onclick="closePlayer()"><i class="fa-solid fa-xmark"></i></button>
    <div id="player-container">
      <video id="main-player" playsinline>
        <source id="player-source" src="" type="video/mp4"/>
        Your browser does not support HTML5 video.
      </video>
      <!-- Custom Controls -->
      <div id="player-controls">
        <div id="player-progress-wrap">
          <div id="player-progress-bar">
            <div id="player-progress-fill"></div>
            <div id="player-thumb"></div>
          </div>
          <span id="player-time">0:00 / 0:00</span>
        </div>
        <div id="player-btns">
          <button id="btn-play" onclick="togglePlay()"><i class="fa-solid fa-play" id="play-icon"></i></button>
          <div id="volume-wrap">
            <button onclick="toggleMute()"><i class="fa-solid fa-volume-high" id="vol-icon"></i></button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)"/>
          </div>
          <div id="quality-wrap">
            <button id="quality-btn"><i class="fa-solid fa-gear"></i> <span id="quality-label">Quality</span></button>
            <div id="quality-menu" class="hidden"></div>
          </div>
          <button onclick="toggleFullscreen()"><i class="fa-solid fa-expand" id="fs-icon"></i></button>
        </div>
      </div>
    </div>
    <div id="player-iframe-wrap" class="hidden">
      <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen" frameborder="0"></iframe>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
