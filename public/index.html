<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS Moviz Hut</title>
  <link rel="icon" href="/logo.png" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>

  <style>
    /* ═══════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:      #7B2FBE;
      --purple-dark: #5A1E8A;
      --purple-lite: #A855F7;
      --red:         #DC2626;
      --red-dark:    #991B1B;
      --red-lite:    #EF4444;
      --black:       #0a0a0a;
      --white:       #FAFAFA;
      --gray:        #1e1e2e;
      --gray-2:      #2a2a3e;
      --border:      3px solid #0a0a0a;
      --shadow:      4px 4px 0 #0a0a0a;
      --shadow-lg:   6px 6px 0 #0a0a0a;
      --radius:      4px;
      --font:        'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--black);
      color: var(--white);
      overflow: hidden;
    }

    /* ═══════════════════════════════════
       INTRO SCREEN
    ═══════════════════════════════════ */
    #intro {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
    }

    #intro-logo {
      width: 180px;
      animation: logoPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards,
                 logoFloat 2s 0.7s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 30px #7B2FBE88);
    }

    #intro-title {
      font-size: 2.4rem; font-weight: 900; letter-spacing: 2px;
      color: var(--white);
      text-shadow: 4px 4px 0 var(--purple);
      animation: fadeInUp 0.6s 0.4s ease both;
    }
    #intro-title span { color: var(--red-lite); }

    #intro-bar {
      width: 220px; height: 6px;
      background: var(--gray-2);
      border: 2px solid var(--black);
      border-radius: 3px;
      overflow: hidden;
      animation: fadeInUp 0.6s 0.6s ease both;
    }
    #intro-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--red));
      width: 0;
      animation: loadBar 1.8s 0.8s ease-out forwards;
    }

    #intro-tagline {
      font-size: 0.85rem; color: #888; letter-spacing: 4px; text-transform: uppercase;
      animation: fadeInUp 0.6s 1s ease both;
    }

    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.3) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes logoFloat {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes loadBar {
      from { width: 0; }
      to   { width: 100%; }
    }

    /* ═══════════════════════════════════
       MAIN APP
    ═══════════════════════════════════ */
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    #header {
      display: flex; align-items: center;
      padding: 12px 20px; gap: 14px;
      background: var(--gray);
      border-bottom: var(--border);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    #header img { width: 42px; height: 42px; object-fit: contain; }
    #header h1 {
      font-size: 1.3rem; font-weight: 900; letter-spacing: 1px;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--purple);
    }
    #header h1 span { color: var(--red-lite); }

    /* Provider pills */
    #providers {
      display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap;
    }
    .provider-btn {
      padding: 6px 14px;
      font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      border: var(--border); background: var(--gray-2); color: var(--white);
      cursor: pointer; border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .provider-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #0a0a0a; }
    .provider-btn.active { background: var(--purple); color: var(--white); }
    .provider-btn.active-red { background: var(--red); }
    .provider-btn[data-src="tamil"].active       { background: var(--purple); }
    .provider-btn[data-src="dubbed"].active      { background: var(--red); }
    .provider-btn[data-src="global"].active      { background: var(--purple-dark); }

    /* ── CHAT MESSAGES ── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: var(--gray); }
    #messages::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

    /* Bubble base */
    .msg {
      max-width: 85%;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border: var(--border); border-radius: var(--radius);
      font-size: 0.93rem; line-height: 1.5;
    }
    .msg.user .bubble {
      background: var(--purple);
      box-shadow: var(--shadow);
      border-color: var(--purple-dark);
      color: var(--white);
    }
    .msg.bot .bubble {
      background: var(--gray-2);
      box-shadow: var(--shadow);
      color: var(--white);
    }

    .msg-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
      color: #666;
    }
    .msg.user .msg-label { text-align: right; }

    /* Typing indicator */
    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple-lite);
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(1); }
      40%         { opacity: 1;   transform: scale(1.3); }
    }

    /* ── MOVIE RESULT CARD ── */
    .movie-card {
      display: flex; gap: 14px;
      background: var(--gray-2);
      border: var(--border);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 8px;
    }
    .movie-card__poster {
      flex-shrink: 0;
      width: 80px; height: 110px;
      object-fit: cover;
      border: var(--border);
      border-radius: var(--radius);
      background: #333;
    }
    .movie-card__poster.placeholder {
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: #555;
      background: var(--gray);
    }
    .movie-card__info { flex: 1; min-width: 0; }
    .movie-card__title {
      font-size: 1rem; font-weight: 800;
      color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .movie-card__meta {
      font-size: 0.78rem; color: #aaa; margin-bottom: 10px;
    }
    .movie-card__meta span {
      display: inline-block; padding: 2px 8px;
      border: 2px solid var(--purple);
      border-radius: 3px; font-weight: 700; color: var(--purple-lite);
      margin-right: 6px; margin-bottom: 4px;
    }
    .movie-card__actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }

    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      border: var(--border); border-radius: var(--radius);
      cursor: pointer; box-shadow: var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .action-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #0a0a0a; }
    .action-btn.watch  { background: var(--purple); color: var(--white); }
    .action-btn.dl     { background: var(--red);    color: var(--white); }
    .action-btn.info   { background: var(--gray);   color: var(--white); border-color: #444; }

    /* No results */
    .no-results {
      padding: 12px;
      border: 2px dashed #555;
      border-radius: var(--radius);
      color: #888; font-size: 0.88rem; text-align: center;
      margin-top: 8px;
    }

    /* ── INPUT BAR ── */
    #input-area {
      padding: 14px 20px;
      background: var(--gray);
      border-top: var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem; font-family: var(--font);
      background: var(--gray-2); color: var(--white);
      border: var(--border); border-radius: var(--radius);
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.3);
      resize: none; outline: none; min-height: 48px; max-height: 120px;
      line-height: 1.5;
    }
    #chat-input::placeholder { color: #555; }
    #chat-input:focus { border-color: var(--purple); }

    #send-btn {
      width: 48px; height: 48px;
      background: var(--purple); color: var(--white);
      border: var(--border); border-radius: var(--radius);
      font-size: 1.1rem; cursor: pointer;
      box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }
    #send-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #0a0a0a; }
    #send-btn:hover  { background: var(--purple-dark); }

    /* ── MODAL BACKDROP ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    /* ── VIDEO PLAYER MODAL ── */
    #player-modal { z-index: 1001; }
    #player-box {
      background: #000;
      border: var(--border);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius);
      width: min(860px, 96vw);
      max-height: 96vh;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    #player-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: var(--gray);
      border-bottom: var(--border);
    }
    #player-title { font-weight: 800; font-size: 0.95rem; color: var(--white); }
    #player-close {
      background: var(--red); color: var(--white);
      border: var(--border); width: 32px; height: 32px;
      border-radius: var(--radius); cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    #player-close:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #0a0a0a; }

    #video-wrap {
      position: relative; background: #000;
      aspect-ratio: 16/9; width: 100%;
    }
    #main-video {
      width: 100%; height: 100%; display: block;
      outline: none; background: #000;
    }
    #player-iframe {
      width: 100%; aspect-ratio: 16/9;
      border: none;
    }

    /* Custom controls */
    #controls {
      background: var(--gray);
      border-top: var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    #controls button {
      background: var(--gray-2); color: var(--white);
      border: 2px solid #444; border-radius: var(--radius);
      width: 34px; height: 34px; cursor: pointer;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #controls button:hover { background: var(--purple); border-color: var(--purple); }
    #controls button:active { transform: translate(1px,1px); }

    #progress-wrap {
      flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    #progress {
      flex: 1; height: 6px; -webkit-appearance: none;
      background: var(--gray-2); border: 2px solid #444;
      border-radius: 3px; cursor: pointer; outline: none;
    }
    #progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--purple); border: 2px solid var(--black);
      cursor: pointer;
    }
    #time-display { font-size: 0.75rem; color: #aaa; white-space: nowrap; }
    #vol-slider {
      width: 70px; height: 6px; -webkit-appearance: none;
      background: var(--gray-2); border: 2px solid #444;
      border-radius: 3px; cursor: pointer; outline: none;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--red); border: 2px solid var(--black);
    }
    #quality-select {
      background: var(--gray-2); color: var(--white);
      border: 2px solid #444; border-radius: var(--radius);
      padding: 4px 8px; font-size: 0.75rem; cursor: pointer; outline: none;
      font-family: var(--font);
    }

    /* ── DOWNLOAD MODAL ── */
    #dl-modal { z-index: 1001; }
    #dl-box {
      background: var(--gray);
      border: var(--border);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius);
      width: min(480px, 94vw);
      padding: 0;
      overflow: hidden;
    }
    #dl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      background: var(--red);
      border-bottom: var(--border);
    }
    #dl-header h3 { font-size: 1rem; font-weight: 900; color: var(--white); }
    #dl-close {
      background: #000; color: var(--white);
      border: 2px solid #000; width: 30px; height: 30px;
      border-radius: var(--radius); cursor: pointer;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    }
    #dl-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .dl-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--gray-2);
      border: var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .dl-item-label { font-size: 0.88rem; font-weight: 800; }
    .dl-item-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--red); color: var(--white);
      border: var(--border); border-radius: var(--radius);
      font-size: 0.78rem; font-weight: 800; cursor: pointer;
      text-decoration: none; box-shadow: var(--shadow);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .dl-item-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #0a0a0a; }

    /* ── LINKS MODAL (choose watch source) ── */
    #links-modal { z-index: 1001; }
    #links-box {
      background: var(--gray);
      border: var(--border);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius);
      width: min(480px, 94vw);
      overflow: hidden;
    }
    #links-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      background: var(--purple);
      border-bottom: var(--border);
    }
    #links-header h3 { font-size: 1rem; font-weight: 900; color: var(--white); }
    #links-close {
      background: #000; color: var(--white);
      border: 2px solid #000; width: 30px; height: 30px;
      border-radius: var(--radius); cursor: pointer;
      font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    }
    #links-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .link-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: var(--gray-2);
      border: var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .link-item-label { font-size: 0.88rem; font-weight: 700; flex: 1; margin-right: 8px; }
    .link-item-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--purple); color: var(--white);
      border: var(--border); border-radius: var(--radius);
      font-size: 0.78rem; font-weight: 800; cursor: pointer;
      box-shadow: var(--shadow); text-transform: uppercase; letter-spacing: 1px;
    }
    .link-item-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #0a0a0a; }

    /* ── LOADING SPINNER (inline) ── */
    .spin {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #555; border-top-color: var(--purple);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #header h1 { font-size: 1rem; }
      .provider-btn { padding: 5px 10px; font-size: 0.7rem; }
      .movie-card { flex-direction: column; }
      .movie-card__poster { width: 100%; height: 160px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════ INTRO ═══════════════════════ -->
<div id="intro">
  <img src="/logo.png" alt="PS Moviz Hut" id="intro-logo" />
  <h2 id="intro-title">PS Moviz<span> Hut</span></h2>
  <div id="intro-bar"><div id="intro-bar-fill"></div></div>
  <p id="intro-tagline">Your Ultimate Movie Destination</p>
</div>

<!-- ═══════════════════════ APP ═══════════════════════ -->
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <img src="/logo.png" alt="PS Moviz Hut Logo" />
    <h1>PS Moviz<span> Hut</span></h1>
    <div id="providers">
      <button class="provider-btn" data-src="tamil"   title="Tamil Movies">
        <i class="fa-solid fa-film"></i> Tamil
      </button>
      <button class="provider-btn" data-src="dubbed"  title="Tamil Dubbed">
        <i class="fa-solid fa-language"></i> Dubbed
      </button>
      <button class="provider-btn active" data-src="global" title="Global Movies">
        <i class="fa-solid fa-globe"></i> Global
      </button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div id="messages">
    <!-- Welcome message -->
    <div class="msg bot">
      <div class="msg-label">
        <i class="fa-solid fa-robot"></i> PS Moviz Hut
      </div>
      <div class="bubble">
        <strong>Welcome to PS Moviz Hut!</strong><br/>
        Type a movie name below and I'll fetch it for you.<br/>
        Switch sources using the buttons above.
      </div>
    </div>
  </div>

  <!-- INPUT BAR -->
  <div id="input-area">
    <textarea id="chat-input" placeholder="Type a movie name… (e.g. Leo, Pushpa, Avengers)" rows="1"></textarea>
    <button id="send-btn" title="Search">
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>

<!-- ═══════════════════════ PLAYER MODAL ═══════════════════════ -->
<div class="modal-backdrop" id="player-modal">
  <div id="player-box">
    <div id="player-header">
      <span id="player-title">Now Playing</span>
      <button id="player-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <!-- Native video player (for direct links) -->
    <div id="video-wrap">
      <video id="main-video" controls preload="metadata"></video>
    </div>
    <!-- Iframe player (for embed links) -->
    <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media"
            style="display:none;" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>

    <!-- Custom controls (only shown when native video is active) -->
    <div id="controls">
      <button id="btn-play"  title="Play/Pause"><i class="fa-solid fa-play"></i></button>
      <button id="btn-mute"  title="Mute"><i class="fa-solid fa-volume-high"></i></button>
      <input  id="vol-slider" type="range" min="0" max="1" step="0.05" value="1" title="Volume" />
      <div id="progress-wrap">
        <input id="progress" type="range" min="0" max="100" value="0" step="0.1" />
        <span id="time-display">0:00 / 0:00</span>
      </div>
      <select id="quality-select" title="Quality">
        <option value="">Auto</option>
      </select>
      <button id="btn-fs" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ DOWNLOAD MODAL ═══════════════════════ -->
<div class="modal-backdrop" id="dl-modal">
  <div id="dl-box">
    <div id="dl-header">
      <h3><i class="fa-solid fa-download"></i> Download Options</h3>
      <button id="dl-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="dl-list"></div>
  </div>
</div>

<!-- ═══════════════════════ LINKS MODAL ═══════════════════════ -->
<div class="modal-backdrop" id="links-modal">
  <div id="links-box">
    <div id="links-header">
      <h3><i class="fa-solid fa-play-circle"></i> Watch Online</h3>
      <button id="links-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="links-list"></div>
  </div>
</div>

<!-- ═══════════════════════ SCRIPT ═══════════════════════ -->
<script>
/* ── State ── */
let currentSource = 'global';
let currentLinks  = { watch: [], download: [] };
let hlsInstance   = null;
let linksCache    = {};

/* ── Intro ── */
window.addEventListener('load', () => {
  setTimeout(() => {
    const intro = document.getElementById('intro');
    intro.style.transition = 'opacity 0.6s ease';
    intro.style.opacity = '0';
    setTimeout(() => {
      intro.style.display = 'none';
      const appEl = document.getElementById('app');
      appEl.style.display = 'flex';
      appEl.style.opacity = '0';
      appEl.style.transition = 'opacity 0.5s ease';
      requestAnimationFrame(() => { appEl.style.opacity = '1'; });
    }, 600);
  }, 2800);
});

/* ── Providers ── */
document.querySelectorAll('.provider-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSource = btn.dataset.src;
    appendBotMsg(`Switched to <strong>${providerLabel(currentSource)}</strong> source.`);
  });
});

function providerLabel(s) {
  return { tamil:'Tamil Movies', dubbed:'Tamil Dubbed', global:'Global Movies' }[s] || s;
}

/* ── Input handling ── */
const chatInput = document.getElementById('chat-input');
const sendBtn   = document.getElementById('send-btn');

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});
sendBtn.addEventListener('click', sendQuery);

chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

function sendQuery() {
  const q = chatInput.value.trim();
  if (!q) return;
  appendUserMsg(q);
  chatInput.value = '';
  chatInput.style.height = 'auto';
  searchMovies(q);
}

/* ── Messages ── */
function appendUserMsg(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `
    <div class="msg-label"><i class="fa-solid fa-user"></i> You</div>
    <div class="bubble">${escHtml(text)}</div>`;
  messages().appendChild(msg);
  scrollBottom();
}

function appendBotMsg(html, extra = '') {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.innerHTML = `
    <div class="msg-label"><i class="fa-solid fa-robot"></i> PS Moviz Hut</div>
    <div class="bubble">${html}</div>${extra}`;
  messages().appendChild(msg);
  scrollBottom();
  return msg;
}

function appendTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-msg';
  msg.innerHTML = `
    <div class="msg-label"><i class="fa-solid fa-robot"></i> PS Moviz Hut</div>
    <div class="bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  messages().appendChild(msg);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

function messages() { return document.getElementById('messages'); }
function scrollBottom() {
  const m = messages();
  m.scrollTop = m.scrollHeight;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Search ── */
async function searchMovies(query) {
  appendTyping();
  sendBtn.disabled = true;

  try {
    const url = `/api/search?q=${encodeURIComponent(query)}&source=${currentSource}`;
    const res  = await fetch(url);
    const data = await res.json();
    removeTyping();

    if (!data.results || data.results.length === 0) {
      appendBotMsg(
        `<i class="fa-solid fa-circle-exclamation" style="color:var(--red-lite)"></i> ` +
        `No results found for "<strong>${escHtml(query)}</strong>" in <em>${providerLabel(currentSource)}</em>. Try another source or spelling.`
      );
    } else {
      const fallbackNote = data.fallback ? `<small style="color:#888;"> (auto-switched to ${data.fallback})</small>` : '';
      appendBotMsg(
        `<i class="fa-solid fa-circle-check" style="color:var(--purple-lite)"></i> ` +
        `Found <strong>${data.count}</strong> result(s) for "<strong>${escHtml(query)}</strong>"${fallbackNote}:`
      );
      data.results.forEach(movie => renderMovieCard(movie));
    }
  } catch (err) {
    removeTyping();
    appendBotMsg(
      `<i class="fa-solid fa-triangle-exclamation" style="color:var(--red-lite)"></i> ` +
      `Error fetching results: ${escHtml(err.message)}`
    );
  } finally {
    sendBtn.disabled = false;
    scrollBottom();
  }
}

/* ── Movie Card ── */
function renderMovieCard(movie) {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.style.maxWidth = '100%';

  const posterHTML = movie.poster
    ? `<img class="movie-card__poster" src="${escHtml(movie.poster)}" alt="${escHtml(movie.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" loading="lazy"/>
       <div class="movie-card__poster placeholder" style="display:none;"><i class="fa-solid fa-film"></i></div>`
    : `<div class="movie-card__poster placeholder"><i class="fa-solid fa-film"></i></div>`;

  const srcLabel = { moviesda:'Tamil', isaidub:'Dubbed', primeshows:'Global', corsflix:'Global' }[movie.source] || movie.source;

  wrap.innerHTML = `
    <div class="msg-label"><i class="fa-solid fa-clapperboard"></i> Result</div>
    <div class="movie-card" id="card-${makeId(movie.url)}">
      ${posterHTML}
      <div class="movie-card__info">
        <div class="movie-card__title" title="${escHtml(movie.title)}">${escHtml(movie.title)}</div>
        <div class="movie-card__meta">
          <span><i class="fa-regular fa-calendar"></i> ${escHtml(movie.year)}</span>
          <span><i class="fa-solid fa-database"></i> ${srcLabel}</span>
        </div>
        <div class="movie-card__actions">
          <button class="action-btn watch" onclick="handleWatch(${JSON.stringify(movie).split('"').join('&quot;')})">
            <i class="fa-solid fa-play"></i> Watch
          </button>
          <button class="action-btn dl" onclick="handleDownload(${JSON.stringify(movie).split('"').join('&quot;')})">
            <i class="fa-solid fa-download"></i> Download
          </button>
          <a class="action-btn info" href="${escHtml(movie.url)}" target="_blank" rel="noopener">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Open
          </a>
        </div>
        <div class="links-status" id="status-${makeId(movie.url)}" style="margin-top:6px;font-size:0.78rem;color:#888;"></div>
      </div>
    </div>`;

  messages().appendChild(wrap);
  scrollBottom();
}

function makeId(url) {
  return btoa(url).replace(/[^a-z0-9]/gi,'').slice(0,16);
}

/* ── Fetch links (cached) ── */
async function fetchLinks(movie) {
  const cacheKey = movie.url;
  if (linksCache[cacheKey]) return linksCache[cacheKey];

  const setStatus = (msg) => {
    const el = document.getElementById('status-' + makeId(movie.url));
    if (el) el.innerHTML = msg;
  };

  setStatus('<span class="spin"></span> Fetching links…');
  try {
    const res  = await fetch(`/api/links?url=${encodeURIComponent(movie.url)}&source=${movie.source}`);
    const data = await res.json();
    linksCache[cacheKey] = data;
    setStatus('');
    return data;
  } catch (e) {
    setStatus('<i class="fa-solid fa-triangle-exclamation" style="color:var(--red-lite)"></i> Link fetch failed');
    return { watch: [], download: [] };
  }
}

/* ── Watch Handler ── */
async function handleWatch(movie) {
  const data = await fetchLinks(movie);
  const watchLinks = data.watch || [];

  if (watchLinks.length === 0) {
    appendBotMsg(`<i class="fa-solid fa-circle-exclamation" style="color:var(--red-lite)"></i> No watch links available for <strong>${escHtml(movie.title)}</strong>. Try downloading instead.`);
    return;
  }

  if (watchLinks.length === 1) {
    openPlayer(watchLinks[0], movie.title);
  } else {
    // Show link picker
    openLinksModal(watchLinks, movie.title);
  }
}

/* ── Download Handler ── */
async function handleDownload(movie) {
  const data = await fetchLinks(movie);
  const dlLinks = data.download || [];

  if (dlLinks.length === 0) {
    // If no download links but has watch links, prompt
    if ((data.watch || []).length > 0) {
      appendBotMsg(`<i class="fa-solid fa-info-circle" style="color:var(--purple-lite)"></i> No direct download links found for <strong>${escHtml(movie.title)}</strong>. Use Watch Online instead.`);
    } else {
      appendBotMsg(`<i class="fa-solid fa-circle-exclamation" style="color:var(--red-lite)"></i> No download links available for <strong>${escHtml(movie.title)}</strong>.`);
    }
    return;
  }

  openDlModal(dlLinks, movie.title);
}

/* ── Player ── */
const playerModal  = document.getElementById('player-modal');
const mainVideo    = document.getElementById('main-video');
const playerIframe = document.getElementById('player-iframe');
const playerTitle  = document.getElementById('player-title');
const videoWrap    = document.getElementById('video-wrap');
const controls     = document.getElementById('controls');

document.getElementById('player-close').addEventListener('click', closePlayer);
playerModal.addEventListener('click', e => { if (e.target === playerModal) closePlayer(); });

function openPlayer(link, title) {
  playerTitle.textContent = title;
  playerModal.classList.add('open');

  const isHLS     = link.type === 'hls' || link.url.includes('.m3u8');
  const isVideo   = link.type === 'video' || link.url.match(/\.(mp4|mkv|webm)(\?|$)/i);
  const isIframe  = link.type === 'iframe' || link.type === 'embed';

  // Reset
  mainVideo.src = '';
  playerIframe.src = 'about:blank';
  mainVideo.style.display = 'none';
  playerIframe.style.display = 'none';
  videoWrap.style.display = 'block';
  controls.style.display = 'flex';
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  if (isHLS && Hls.isSupported()) {
    mainVideo.style.display = 'block';
    hlsInstance = new Hls({ xhrSetup: xhr => { xhr.setRequestHeader('Origin', location.origin); } });
    // Try direct first, then proxy
    try {
      hlsInstance.loadSource(link.url);
    } catch(e) {
      hlsInstance.loadSource(`/api/proxy?url=${encodeURIComponent(link.url)}`);
    }
    hlsInstance.attachMedia(mainVideo);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => mainVideo.play().catch(()=>{}));
    hlsInstance.on(Hls.Events.LEVEL_LOADED, (_, data) => {
      populateQuality(hlsInstance.levels);
    });
  } else if (isVideo) {
    mainVideo.style.display = 'block';
    mainVideo.src = link.url;
    mainVideo.play().catch(() => {
      // Fallback to proxy
      mainVideo.src = `/api/proxy?url=${encodeURIComponent(link.url)}`;
      mainVideo.play().catch(()=>{});
    });
  } else if (isIframe) {
    videoWrap.style.display = 'none';
    controls.style.display  = 'none';
    playerIframe.style.display = 'block';
    playerIframe.src = link.url;
  } else {
    // Unknown — try as video, fallback to iframe
    mainVideo.style.display = 'block';
    mainVideo.src = link.url;
    mainVideo.play().catch(() => {
      mainVideo.style.display = 'none';
      videoWrap.style.display = 'none';
      controls.style.display  = 'none';
      playerIframe.style.display = 'block';
      playerIframe.src = link.url;
    });
  }
}

function closePlayer() {
  playerModal.classList.remove('open');
  mainVideo.pause();
  mainVideo.src = '';
  playerIframe.src = 'about:blank';
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
}

/* Player controls */
const btnPlay = document.getElementById('btn-play');
const btnMute = document.getElementById('btn-mute');
const btnFs   = document.getElementById('btn-fs');
const progress = document.getElementById('progress');
const timeDsp  = document.getElementById('time-display');
const volSlider = document.getElementById('vol-slider');
const qualSel   = document.getElementById('quality-select');

btnPlay.addEventListener('click', () => {
  if (mainVideo.paused) { mainVideo.play(); }
  else { mainVideo.pause(); }
});
mainVideo.addEventListener('play',  () => btnPlay.innerHTML = '<i class="fa-solid fa-pause"></i>');
mainVideo.addEventListener('pause', () => btnPlay.innerHTML = '<i class="fa-solid fa-play"></i>');

btnMute.addEventListener('click', () => {
  mainVideo.muted = !mainVideo.muted;
  btnMute.innerHTML = mainVideo.muted
    ? '<i class="fa-solid fa-volume-xmark"></i>'
    : '<i class="fa-solid fa-volume-high"></i>';
});

volSlider.addEventListener('input', () => { mainVideo.volume = parseFloat(volSlider.value); });

mainVideo.addEventListener('timeupdate', () => {
  if (!mainVideo.duration) return;
  const pct = (mainVideo.currentTime / mainVideo.duration) * 100;
  progress.value = pct;
  timeDsp.textContent = `${fmt(mainVideo.currentTime)} / ${fmt(mainVideo.duration)}`;
});

progress.addEventListener('input', () => {
  if (!mainVideo.duration) return;
  mainVideo.currentTime = (parseFloat(progress.value) / 100) * mainVideo.duration;
});

btnFs.addEventListener('click', () => {
  const box = document.getElementById('player-box');
  if (document.fullscreenElement) document.exitFullscreen();
  else box.requestFullscreen();
});

qualSel.addEventListener('change', () => {
  if (hlsInstance && qualSel.value !== '') {
    hlsInstance.currentLevel = parseInt(qualSel.value);
  }
});

function populateQuality(levels) {
  qualSel.innerHTML = '<option value="-1">Auto</option>';
  levels.forEach((lvl, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = lvl.height ? `${lvl.height}p` : `Level ${i}`;
    qualSel.appendChild(opt);
  });
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

/* ── Links Modal ── */
const linksModal = document.getElementById('links-modal');
const linksList  = document.getElementById('links-list');

document.getElementById('links-close').addEventListener('click', () => linksModal.classList.remove('open'));
linksModal.addEventListener('click', e => { if (e.target === linksModal) linksModal.classList.remove('open'); });

function openLinksModal(watchLinks, title) {
  linksList.innerHTML = '';
  watchLinks.forEach((link, i) => {
    const item = document.createElement('div');
    item.className = 'link-item';
    const label = link.label || `Source ${i+1}`;
    item.innerHTML = `
      <span class="link-item-label">
        <i class="fa-solid fa-${link.type==='hls'?'tower-broadcast':'play'}"></i>
        ${escHtml(label)}
      </span>
      <button class="link-item-btn" onclick="openPlayer(${JSON.stringify(link).split('"').join('&quot;')}, '${escHtml(title)}'); linksModal.classList.remove('open');">
        <i class="fa-solid fa-play"></i> Play
      </button>`;
    linksList.appendChild(item);
  });
  linksModal.classList.add('open');
}

/* ── Download Modal ── */
const dlModal = document.getElementById('dl-modal');
const dlList  = document.getElementById('dl-list');

document.getElementById('dl-close').addEventListener('click', () => dlModal.classList.remove('open'));
dlModal.addEventListener('click', e => { if (e.target === dlModal) dlModal.classList.remove('open'); });

function openDlModal(dlLinks, title) {
  dlList.innerHTML = '';
  dlLinks.forEach(link => {
    const item = document.createElement('div');
    item.className = 'dl-item';
    const quality = link.quality || 'Download';
    item.innerHTML = `
      <span class="dl-item-label">
        <i class="fa-solid fa-film"></i> ${escHtml(quality)}
      </span>
      <a class="dl-item-btn" href="${escHtml(link.url)}" target="_blank" rel="noopener" download>
        <i class="fa-solid fa-download"></i> Download
      </a>`;
    dlList.appendChild(item);
  });
  dlModal.classList.add('open');
}
</script>
